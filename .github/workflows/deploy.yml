name: Deploy versioned docs

# Versioned docs via squidfunk's Zensical-compatible mike fork. mike
# maintains one subdirectory per deployed version on the `gh-pages`
# branch, plus a versions.json that the Material header version
# selector reads. GitHub Pages serves the gh-pages branch directly.
#
# Branch -> action mapping:
#   stable  -> mike deploy v1.0.3 stable latest  (and set-default latest)
#   main    -> mike deploy dev
#
# When promoting a new stable release: bump the version on the stable
# branch's deploy command, push.

on:
  push:
    branches: [main, stable]
  workflow_dispatch:

permissions:
  # mike pushes to gh-pages — needs write to repo contents.
  contents: write

# Don't cancel in-progress deploys; mike fetches gh-pages, mutates it,
# pushes back. Cancellation mid-flight could leave gh-pages in a weird
# state. Queue instead.
concurrency:
  group: mike-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install zensical + mike (squidfunk fork)
        run: |
          pip install zensical
          pip install git+https://github.com/squidfunk/mike

      - name: Prepare docs/ tree
        run: |
          mkdir -p docs
          cp README.md docs/index.md
          for d in battery battery-charger bluetooth dashboard electronic mechanical nrf redis services states tools wiring; do
            [ -d "$d" ] && cp -r "$d" "docs/$d"
          done
          [ -d stylesheets ] && cp -r stylesheets docs/stylesheets || true

      - name: Configure git for mike
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Deploy stable -> v1.0.3 + stable + latest aliases
        if: github.ref == 'refs/heads/stable'
        run: |
          mike deploy --push --update-aliases v1.0.3 stable latest
          mike set-default --push latest

      - name: Deploy main -> dev
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: mike deploy --push dev

      # mike doesn't preserve a top-level CNAME across deploys (each
      # deploy operates on a single version subdirectory), so re-stamp
      # it after every deploy. Without this, switching the GitHub Pages
      # source to gh-pages drops the custom domain.
      - name: Re-stamp CNAME on gh-pages
        run: |
          git fetch origin gh-pages
          git worktree add /tmp/ghpages origin/gh-pages
          cd /tmp/ghpages
          if [ "$(cat CNAME 2>/dev/null)" != "reference.librescoot.org" ]; then
            echo "reference.librescoot.org" > CNAME
            git add CNAME
            git commit -m "ci: ensure CNAME is reference.librescoot.org"
            git push origin HEAD:gh-pages
          fi
